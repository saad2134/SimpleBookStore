<!DOCTYPE html>
<html>

<head>
    <title>Login or Signup | SimpleBookStore</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="/assets/icon.ico">
    <script src="js/auth.js"></script>
</head>

<body>
    <!-- NAVBAR -->
    <ul>
        <li> <a class="sitename">SimpleBookStore</a> </li>
        <li> <a href="index.html">Home</a> </li>
        <li> <a href="catalog.html">Books Catalog</a> </li>
        <li style="float: right"> <a href="cart.html">Cart</a> </li>
        <li style="float: right"> <a class="active" href="auth.html">Login / Signup</a> </li>
        <li style="float: right"> <a href="profile.html">My Profile</a> </li>

    </ul>

    <!-- CONTENT -->

    <!-- LOGIN FORM -->
    <div class="auth-container">
        <div class="auth-box">
            <h2>Login</h2>
            <form id="loginForm">
                <label>Email or Phone</label>
                <input type="text" id="loginEmail" required>
                <button type="submit" onclick="loginUser1()">Continue</button>
            </form>
            <p>By continuing, you agree to our <a href="#">Conditions of Use</a> and <a href="#">Privacy Notice</a>.</p>
        </div>

        <!-- REGISTRATION FORM -->
        <div class="auth-box">
            <h2>Create Account</h2>
            <form id="registerForm">
                <label>Your Name *</label>
                <input type="text" id="regName" placeholder="John Doe" required>

                <label>Email *</label>
                <input type="email" id="regEmail" placeholder="me@example.com" required>

                <label>Mobile Phone Number *</label>
                <input type="tel" id="regPhone" placeholder="+91 98765 43210" required>

                <label>Address *</label>
                <input type="text" id="regAddress" placeholder="1-2-3/A, Abc Locality, Abc City, Abc State, Abc Country, ZIP/PIN Code" required>

                <label>Password *</label>
                <input type="password" id="regPassword" placeholder="At least 6 characters." required>

                <label>Confirm Password *</label>
                <input type="password" id="regCPassword" placeholder="Must match password." required>

                <button type="submit" onclick="registerUser()">Create your account</button>
            </form>
        </div>
    </div>

</body>

</html>
